data:
  root_dir: data/euclid_like/images
  train_csv: data/euclid_like/train.csv
  val_csv: data/euclid_like/val.csv
  test_csv: data/euclid_like/test.csv
  image_size: 224
  batch_size: 16
  num_workers: 0

model:
  name: swin_tiny_patch4_window7_224
  num_classes: 2
  pretrained: false

train:
  epochs: 1
  lr: 0.0001
  weight_decay: 0.0001
  amp: false
  seed: 42
  output_dir: runs/smoke_cpu
  positive_class: 1
