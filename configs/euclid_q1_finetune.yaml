data:
  root_dir: data/euclid_q1_dataset/images
  train_csv: data/euclid_q1_dataset/train.csv
  val_csv: data/euclid_q1_dataset/val.csv
  test_csv: data/euclid_q1_dataset/test.csv
  image_size: 224
  batch_size: 8
  num_workers: 0

model:
  name: swin_tiny_patch4_window7_224
  num_classes: 2
  pretrained: true

train:
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  amp: false
  seed: 42
  output_dir: runs/euclid_q1_finetune
  positive_class: 1
