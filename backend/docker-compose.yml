services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sglds_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sglds_network

  # Redis (optional, for Phase 2 caching)
  # redis:
  #   image: redis:7-alpine
  #   container_name: sglds_redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - sglds_network

volumes:
  postgres_data:
  # redis_data:

networks:
  sglds_network:
    driver: bridge
